<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AuraForce AI</title>
    <meta http-equiv="refresh" content="0; url=web/index.html">
    <link rel="canonical" href="web/index.html">
    <style>
      :root {
        color-scheme: dark;
        --obsidian: #08090b;
        --champagne: #f1d592;
        --text: #f6f1e7;
        --muted: #beb7aa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        color: var(--text);
        background: var(--obsidian);
        font-family: Inter, Arial, sans-serif;
      }

      main {
        width: min(560px, calc(100% - 48px));
        border: 1px solid rgba(241, 213, 146, 0.18);
        border-radius: 8px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.045);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        color: var(--champagne);
        font-weight: 800;
      }
    </style>
    <script>
      const target = "web/index.html" + window.location.search + window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <main>
      <h1>AuraForce AI</h1>
      <p>Opening the AuraForce AI landing page. <a href="web/index.html">Continue manually</a>.</p>
    </main>
  </body>
</html>
